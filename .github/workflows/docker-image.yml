name: Build and Push to GHCR

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Get Camoufox Download URL
      id: get_camoufox_url
      run: |
        # 使用 GitHub API 获取 Camoufox 最新版本的下载链接
        CAMOUFOX_API_URL="https://api.github.com/repos/daijro/camoufox/releases/latest"
        URL=$(curl -s "$CAMOUFOX_API_URL" | grep "browser_download_url.*camoufox-linux.tar.gz" | head -1 | cut -d : -f 2,3 | tr -d '", ')
        
        # 如果没有找到，使用一个固定的可靠链接
        if [ -z "$URL" ]; then
          URL="https://github.com/daijro/camoufox/releases/latest/download/camoufox-linux.tar.gz"
        fi
        
        echo "CAMOUFOX_URL=$URL" >> $GITHUB_ENV
        echo "Found Camoufox URL: $URL"
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          CAMOUFOX_URL=${{ env.CAMOUFOX_URL }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
